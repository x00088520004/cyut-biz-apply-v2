
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei','Noto Sans TC',sans-serif;background:#eef2f8;color:#1e2d42;-webkit-text-size-adjust:100%}

/* ── Top Bar ── */
#topbar{position:sticky;top:0;z-index:100;background:#0B2F5E;padding:8px 10px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.tb-row1{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.tb-tabs{display:flex;gap:5px;flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tb-tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:all .2s}
.tab.on{background:#C9A44A;color:#1a1000}
.tb-row2{display:flex;align-items:center;gap:5px}
.tb-si{color:rgba(255,255,255,.5);font-size:11px;flex:1;text-align:center}
.tb-btns{display:flex;gap:5px}
.tb-btns button{padding:7px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;-webkit-tap-highlight-color:transparent}
#bprev{background:rgba(255,255,255,.12);color:white}
#bnext{background:#C9A44A;color:#1a1000}
#bpreview{background:rgba(255,255,255,.12);color:white}
#bdl{background:linear-gradient(135deg,#C9A44A,#e8c566);color:#1a1000}
#bdl:disabled{background:#444;color:#777;cursor:not-allowed}

.prog{height:3px;background:rgba(255,255,255,.1)}
.pf{height:100%;background:#C9A44A;transition:width .4s}

/* ── Cards ── */
.wrap{max-width:620px;margin:0 auto;padding:10px 10px 30px}
.card{background:white;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(11,47,94,.08);margin-bottom:10px;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ch{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #eef2f8}
.sb{background:#0B2F5E;color:#C9A44A;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:900;flex-shrink:0;text-align:center;line-height:1.4;min-width:34px}
.ch h2{font-size:14px;color:#0B2F5E;font-weight:800}
.ch small{font-size:10.5px;color:#8a9ab0;display:block;margin-top:1px}
.fg{margin-bottom:11px}

/* 兩欄在寬螢幕，手機變單欄 */
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
@media(max-width:480px){.fr{grid-template-columns:1fr}}

label{display:block;font-size:11px;font-weight:700;color:#5a6a7e;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.req::after{content:' *';color:#e74c3c}

/* 輸入框：手機加大 */
input[type=text],input[type=email],input[type=tel]{width:100%;padding:10px 12px;border:1.5px solid #d8e2ed;border-radius:9px;font-size:15px;font-family:inherit;color:#1e2d42;background:white;outline:none;display:block}
input:focus{border-color:#0B2F5E}
textarea.tf{width:100%;padding:11px 13px;border:1.5px solid #d8e2ed;border-radius:9px;font-size:15px;font-family:inherit;color:#1e2d42 !important;background:white !important;outline:none;display:block;resize:vertical;line-height:1.85;min-height:120px}
textarea.tf:focus{border-color:#0B2F5E}

/* 特質格：手機單欄 */
.traits-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:5px}
@media(max-width:480px){.traits-grid{grid-template-columns:1fr}}
.trait-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid #d8e2ed;border-radius:9px;cursor:pointer;font-size:13px;color:#3a4a5a;background:white;transition:all .2s;-webkit-tap-highlight-color:transparent}
.trait-item.on{border-color:#0B2F5E;background:#f0f4fa;color:#0B2F5E;font-weight:700}

/* 範例按鈕 */
.ex-btn{display:inline-flex;align-items:center;gap:6px;background:#e8f5e9;border:1.5px solid #4CAF50;color:#1b5e20;border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:9px;-webkit-tap-highlight-color:transparent}
.ex-btn:active{background:#c8e6c9}

/* 照片上傳區 */
.iz{border:2px dashed #c8d6e5;border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:white;position:relative;overflow:hidden;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent}
.iz.has{border-style:solid;border-color:#C9A44A}
.iz img{max-height:80px;max-width:100%;border-radius:6px;object-fit:cover;pointer-events:none}
.iz .ui{font-size:24px;margin-bottom:4px}
.iz p{font-size:12px;color:#8a9ab0;pointer-events:none}
.iz .cam{font-size:11px;color:#C9A44A;font-weight:700;margin-top:3px}
.rmb{position:absolute;top:6px;right:6px;background:#e74c3c;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;font-weight:700;line-height:22px;text-align:center;z-index:2}
input[type=file]{display:none}

.notice{background:linear-gradient(135deg,#0B2F5E,#1a4a8a);color:#fff;border-radius:12px;padding:13px 15px;display:flex;align-items:center;gap:12px;margin-bottom:10px;font-size:13px}
.notice h3{font-size:14px;margin-bottom:3px}
.notice .tag{font-size:11px;color:#C9A44A;margin-top:3px}

/* Example Modal */
#exmodal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);align-items:flex-end;justify-content:center}
@media(min-width:600px){#exmodal{align-items:center}}
#exmodal.show{display:flex}
#exbox{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.3)}
@media(min-width:600px){#exbox{border-radius:16px;max-height:85vh}}
.ex-hd{background:linear-gradient(135deg,#27ae60,#2ecc71);padding:14px 16px;border-radius:18px 18px 0 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1}
@media(min-width:600px){.ex-hd{border-radius:16px 16px 0 0}}
.ex-hd h3{color:white;font-size:15px}
.ex-hd small{color:rgba(255,255,255,.9);font-size:12px;display:block;margin-top:2px}
#exclosebtn{background:rgba(255,255,255,.2);color:white;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:700}
.ex-body{padding:14px;background:#fff}
.ex-intro{font-size:13px;color:#2e7d32;margin-bottom:12px;font-weight:700;background:#e8f5e9;padding:10px 13px;border-radius:8px}
.ex-item{border:2px solid #a5d6a7;border-radius:12px;padding:14px;margin-bottom:12px;cursor:pointer;transition:all .2s;background:#fff;-webkit-tap-highlight-color:transparent}
.ex-item:active{background:#f1f8f1}
.ex-num{font-size:11px;font-weight:700;color:#fff;background:#0B2F5E;padding:3px 9px;border-radius:8px;display:inline-block;margin-bottom:5px}
.ex-tag{font-size:12px;font-weight:700;color:#fff;background:#27ae60;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:9px;margin-left:5px}
.ex-text{font-size:13.5px;color:#1a2832;line-height:1.85;white-space:pre-wrap}
.ex-hint{font-size:12px;color:#666;text-align:center;margin-top:8px;background:#f5f5f5;padding:8px;border-radius:8px}

/* Preview Modal */
#pvmodal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);flex-direction:column}
#pvmodal.show{display:flex}
#pvtop{background:#0B2F5E;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#pvtop span{color:#C9A44A;font-size:14px;font-weight:700;flex:1}
#pvclosebtn{background:rgba(255,255,255,.15);color:white;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700}
#pvbody{flex:1;overflow-y:auto;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:18px}
.pv-lbl{color:rgba(255,255,255,.5);font-size:10px;margin-bottom:5px;text-align:center;font-weight:700;letter-spacing:1px}
.pv-outer{overflow:hidden;border-radius:6px;box-shadow:0 6px 30px rgba(0,0,0,.7)}

/* Loading */
#lo{display:none;position:fixed;inset:0;background:rgba(5,15,35,.88);z-index:9999;align-items:center;justify-content:center}
#lo.show{display:flex}
.lc{background:#fff;border-radius:14px;padding:28px 36px;text-align:center;min-width:200px}
.ring{width:44px;height:44px;border:5px solid #eef2f8;border-top:5px solid #0B2F5E;border-right:5px solid #C9A44A;border-radius:50%;animation:sp .9s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.lc h3{font-size:15px;color:#0B2F5E;margin-bottom:4px}
#lst{font-size:12px;color:#C9A44A;margin-top:5px;font-weight:700}
</style>

<div id="topbar">
  <div class="tb-row1">
    <div class="tb-tabs">
      <button class="tab on" data-doc="0">D1 多元表現</button>
      <button class="tab" data-doc="1">D2 學習歷程</button>
      <button class="tab" data-doc="2">D3 有利資料</button>
    </div>
  </div>
  <div class="tb-row2">
    <div class="tb-si" id="si">步驟 1 / 6</div>
    <div class="tb-btns">
      <button id="bprev">‹ 上一步</button>
      <button id="bnext">下一步 ›</button>
      <button id="bpreview">👁</button>
      <button id="bdl">📄 下載PDF</button>
    </div>
  </div>
</div>
<div class="prog"><div class="pf" id="fill"></div></div>
<div class="wrap"><div id="fc"></div></div>

<div id="exmodal">
  <div id="exbox">
    <div class="ex-hd"><div><h3 id="ex-title">💡 參考範例</h3><small>選一份填入，再依自己情況修改</small></div><button id="exclosebtn">✕</button></div>
    <div class="ex-body" id="ex-body"></div>
  </div>
</div>
<div id="pvmodal">
  <div id="pvtop"><span>📄 PDF 預覽</span><button id="pvclosebtn">✕ 關閉</button></div>
  <div id="pvbody"></div>
</div>
<div id="lo"><div class="lc"><div class="ring"></div><h3>正在生成 PDF</h3><p style="font-size:12px;color:#8a9ab0">請勿關閉頁面</p><div id="lst">準備中...</div></div></div>

<script>
var doc=0,step=[0,0,0],TOTALS=[6,7,4],currentExKey='';
var fd={school:'',dept:'',name:'',c2:'',c2img:null,c3:'',c3img:null,c4:'',c4h:'',c4img:null,c8:'',c8img:null,d1conc:'',d2roles:'',d2activities:'',d2competitions:'',d2traits:[],d2phone:'',d2email:'',d2bio:'',d2motive:'',d2g1n:'',d2g1t:'',d2g1img:null,d2g2n:'',d2g2t:'',d2g3n:'',d2g3t:'',d2c1n:'',d2c1t:'',d2c2n:'',d2c2t:'',d2plan:'',d2reflect:'',d3lang:'',d3langimg:null,d3awards:'',d3awardsimg:null,d3projects:'',d3projectsimg:null,d3other:'',d3otherimg:null};
var TRAITS=['重視責任與合作','主動學習、持續精進','關心產業發展','邏輯清晰、善於分析','思考靈活、常有創意','規劃有條理、執行力強','表達清晰、溝通良好'];

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 照片上傳區：手機加 capture="environment" 讓相機直接開
function iz(key){
  var f='<input type="file" id="f_'+key+'" accept="image/*" capture="environment" data-for="'+key+'">';
  return fd[key]
    ?'<div class="iz has" data-zone="'+key+'"><img src="'+fd[key]+'"><button class="rmb" data-rm="'+key+'">✕</button></div>'+f
    :'<div class="iz" data-zone="'+key+'"><div class="ui">📸</div><p>點擊上傳照片</p><div class="cam">📷 手機可直接拍照</div></div>'+f;
}
function exbtn(key,lbl){return'<button class="ex-btn" data-ex="'+key+'">💡 參考範例 — '+lbl+'</button>';}
function traitsHTML(){return'<div class="traits-grid">'+TRAITS.map(function(t,i){var on=fd.d2traits.indexOf(t)>=0;return'<label class="trait-item'+(on?' on':'')+'" data-trait="'+i+'"><span style="font-size:16px">'+(on?'☑':'☐')+'</span><span>'+t+'</span></label>';}).join('')+'</div>';}

var D1=[
  function(){return'<div class="card"><div class="ch"><div class="sb">D1<br><span style="font-size:8px">封面</span></div><div><h2>封面基本資訊</h2><small>三份文件共用，填一次即可</small></div></div><div class="fr"><div><label class="req">畢業學校</label><input type="text" data-f="school" placeholder="例：國立台中附工" value="'+esc(fd.school)+'"></div><div><label class="req">畢業科系</label><input type="text" data-f="dept" placeholder="例：商業經營科" value="'+esc(fd.dept)+'"></div></div><div class="fg"><label class="req">申請人姓名</label><input type="text" data-f="name" placeholder="請填寫全名" value="'+esc(fd.name)+'"></div></div>';},
  function(){return'<div class="card"><div class="ch"><div class="sb">C-2</div><div><h2>社團活動</h2><small>高中三年社團參與、角色、收穫</small></div></div>'+exbtn('c2','社團活動')+'<textarea class="tf" data-f="c2" placeholder="高一至高二：社團名稱\n活動內容與收穫。\n\n高二起：社團名稱（職稱）\n具體活動、學到的能力。">'+esc(fd.c2)+'</textarea><div class="fg" style="margin-top:10px"><label>相關照片（可選）</label>'+iz('c2img')+'</div></div>';},
  function(){return'<div class="card"><div class="ch"><div class="sb">C-3</div><div><h2>幹部經驗</h2><small>各年級擔任幹部職責與貢獻</small></div></div>'+exbtn('c3','幹部經驗')+'<textarea class="tf" data-f="c3" placeholder="高一：職稱\n負責事項與成果。\n\n高二：職稱\n負責事項與成果。">'+esc(fd.c3)+'</textarea><div class="fg" style="margin-top:10px"><label>相關照片（可選）</label>'+iz('c3img')+'</div></div>';},
  function(){return'<div class="card"><div class="ch"><div class="sb">C-4</div><div><h2>服務學習</h2></div></div>'+exbtn('c4','服務學習')+'<textarea class="tf" data-f="c4" placeholder="班級環境整理\n內容與收穫。\n\n社區志工\n地點、內容與反思。">'+esc(fd.c4)+'</textarea><div class="fg" style="margin-top:10px"><div class="fr"><div><label>累計服務時數</label><input type="text" data-f="c4h" placeholder="例：72 小時" value="'+esc(fd.c4h)+'"></div><div><label>相關照片（可選）</label>'+iz('c4img')+'</div></div></div></div>';},
  function(){return'<div class="card"><div class="ch"><div class="sb">C-8</div><div><h2>特殊優良表現</h2><small>競賽、學業、特殊能力等</small></div></div>'+exbtn('c8','特殊表現')+'<textarea class="tf" data-f="c8" placeholder="學業表現\n成績、排名、獎項。\n\n競賽表現\n比賽名稱與獎項。">'+esc(fd.c8)+'</textarea><div class="fg" style="margin-top:10px"><label>獎狀或照片（可選）</label>'+iz('c8img')+'</div></div>';},
  function(){return'<div class="notice"><div style="font-size:26px">🎉</div><div><h3>D1 最後一步！</h3><p>完成後按「👁」預覽，再按「📄 下載PDF」</p><div class="tag">⚠️ 生成需 20–35 秒</div></div></div><div class="card"><div class="ch"><div class="sb" style="line-height:1.3">結<br>論</div><div><h2>多元表現總整心得</h2></div></div>'+exbtn('d1conc','總整結論')+'<textarea class="tf" data-f="d1conc" style="min-height:150px" placeholder="① 統整幹部、社團、服務、競賽各類成長\n② 說明如何確立對企管的興趣\n③ 表達就讀朝陽企管系的期望">'+esc(fd.d1conc)+'</textarea></div>';},
];
var D2=[
  function(){return'<div class="card"><div class="ch"><div class="sb">D2<br><span style="font-size:8px">簡歷</span></div><div><h2>個人簡歷</h2></div></div><div class="fg"><label>幹部經歷（每行一條）</label><textarea class="tf" data-f="d2roles" style="min-height:80px" placeholder="高一英文小老師\n高二商業概論小老師">'+esc(fd.d2roles)+'</textarea></div><div class="fg"><label>活動參與（每行一條）</label><textarea class="tf" data-f="d2activities" style="min-height:70px" placeholder="高一：羽球隊幹部">'+esc(fd.d2activities)+'</textarea></div><div class="fg"><label>競賽表現（每行一條）</label><textarea class="tf" data-f="d2competitions" style="min-height:70px" placeholder="班際杯籃球賽第一名">'+esc(fd.d2competitions)+'</textarea></div><div class="fg"><label>個人特質（可複選）</label>'+traitsHTML()+'</div><div class="fr"><div><label>聯絡電話</label><input type="tel" data-f="d2phone" placeholder="0912-345-678" value="'+esc(fd.d2phone)+'"></div><div><label>Email</label><input type="email" data-f="d2email" placeholder="example@mail.com" value="'+esc(fd.d2email)+'"></div></div></div>';},
  function(){return'<div class="card"><div class="ch"><div class="sb">D2</div><div><h2>自傳</h2></div></div>'+exbtn('d2bio','自傳')+'<textarea class="tf" data-f="d2bio" style="min-height:180px" placeholder="① 家庭背景與成長環境\n② 求學過程與重要轉折\n③ 個人特質與興趣專長">'+esc(fd.d2bio)+'</textarea></div>';},
  function(){return'<div class="card"><div class="ch"><div class="sb">D2</div><div><h2>就讀動機</h2></div></div>'+exbtn('d2motive','就讀動機')+'<textarea class="tf" data-f="d2motive" style="min-height:180px" placeholder="① 對企業管理的興趣從何而來\n② 了解朝陽企管系的契機\n③ 就讀後的期望">'+esc(fd.d2motive)+'</textarea></div>';},

function render(){
  var forms=DOCS[doc];var s=step[doc];if(s>=forms.length)s=forms.length-1;
  document.getElementById('fc').innerHTML=forms[s]();
  document.getElementById('si').textContent='步驟 '+(s+1)+' / '+TOTALS[doc];
  document.getElementById('fill').style.width=(((s+1)/TOTALS[doc])*100)+'%';
  document.getElementById('bprev').style.display=s===0?'none':'inline-block';
  document.getElementById('bnext').style.display=s===TOTALS[doc]-1?'none':'inline-block';
  document.getElementById('bdl').style.display=s===TOTALS[doc]-1?'inline-block':'none';
  document.querySelectorAll('.tab').forEach(function(t){t.className='tab'+(parseInt(t.getAttribute('data-doc'))===doc?' on':'');});
}
document.getElementById('bnext').onclick=function(){if(step[doc]<TOTALS[doc]-1){step[doc]++;render();window.scrollTo(0,0);}};
document.getElementById('bprev').onclick=function(){if(step[doc]>0){step[doc]--;render();window.scrollTo(0,0);}};
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){doc=parseInt(t.getAttribute('data-doc'));render();window.scrollTo(0,0);};});
document.addEventListener('input',function(e){var f=e.target.getAttribute('data-f');if(f&&f in fd)fd[f]=e.target.value;});
document.addEventListener('change',function(e){var k=e.target.getAttribute('data-for');if(!k)return;var file=e.target.files[0];if(!file)return;var r=new FileReader();r.onload=function(ev){fd[k]=ev.target.result;render();};r.readAsDataURL(file);});
document.addEventListener('click',function(e){
  var rm=e.target.getAttribute('data-rm');if(rm){e.stopPropagation();fd[rm]=null;render();return;}
  var z=e.target.closest('[data-zone]');if(z&&!fd[z.getAttribute('data-zone')]){var fi=document.getElementById('f_'+z.getAttribute('data-zone'));if(fi)fi.click();return;}
