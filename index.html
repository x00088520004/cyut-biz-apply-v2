<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>朝陽科技大學 企業管理系 — 申請文件產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  /* Palette — warm editorial, archive paper */
  --bg:#EFE9DA;            /* warm parchment */
  --paper:#FFFFFF;
  --cream:#FAF6ED;
  --cream-deep:#F5EFE0;

  --ink:#1A1612;           /* deep warm charcoal */
  --ink-soft:#5A554E;      /* muted warm gray */
  --ink-light:#8A847C;     /* light warm gray */

  --navy:#1E2A4A;          /* deep midnight (school identity) */
  --navy-deep:#0F1729;
  --brass:#A8853A;         /* aged brass — primary accent */
  --brass-deep:#8B6E2D;
  --brass-light:#C9A44A;   /* highlight gold */
  --brass-pale:#F0E5C3;
  --brass-mist:#FAF1D9;

  --line:#E5DDC9;          /* warm cream line */
  --line-soft:#F0EBE0;
  --line-strong:#C9C0AE;

  /* Typography */
  --serif:'Noto Serif TC',serif;
  --sans:'Noto Sans TC','Microsoft JhengHei',sans-serif;
  --display:'Cormorant Garamond','Noto Serif TC',serif;

  /* Effects */
  --shadow-soft:0 1px 2px rgba(26,22,18,.04),0 4px 16px rgba(26,22,18,.05);
  --shadow-lift:0 6px 18px rgba(26,22,18,.09),0 16px 36px rgba(26,22,18,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.6}
body{background-image:radial-gradient(circle at 20% 10%,rgba(168,133,58,.04) 0%,transparent 40%),radial-gradient(circle at 80% 90%,rgba(30,42,74,.03) 0%,transparent 40%);background-attachment:fixed;min-height:100vh}

/* ════════ Top Bar ════════ */
#topbar{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--navy-deep),var(--navy));box-shadow:0 1px 0 var(--brass),0 2px 18px rgba(15,23,41,.35)}
.tb-inner{padding:11px 14px;display:flex;flex-direction:column;gap:10px;max-width:1200px;margin:0 auto}
.tb-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tb-brand{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.tb-mark{width:34px;height:34px;border:1px solid var(--brass-light);display:flex;align-items:center;justify-content:center;color:var(--brass-light);font-family:var(--display);font-style:italic;font-weight:600;font-size:18px;flex-shrink:0;background:rgba(201,164,74,.06);position:relative;letter-spacing:0;line-height:1;transition:all .3s}
.tb-mark::before,.tb-mark::after{content:'';position:absolute;width:5px;height:5px;border:1px solid var(--brass-light)}
.tb-mark::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.tb-mark::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.tb-tt{color:#fff;font-size:13px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--serif);letter-spacing:.5px}
.tb-tt small{display:block;font-family:var(--display);font-style:italic;font-size:10.5px;color:var(--brass-light);font-weight:500;letter-spacing:1.5px;margin-top:2px;opacity:.85}

.tb-tabs{display:flex;gap:0;background:transparent;border:1px solid rgba(201,164,74,.25);padding:0;border-radius:0}
.tab{padding:8px 14px;border:none;font-size:11.5px;font-weight:600;cursor:pointer;font-family:var(--serif);background:transparent;color:rgba(255,255,255,.55);transition:all .25s ease;letter-spacing:.8px;border-right:1px solid rgba(201,164,74,.18);position:relative}
.tab:last-child{border-right:none}
.tab.on{background:var(--brass-light);color:var(--navy-deep);font-weight:700}
.tab:hover:not(.on){color:#fff;background:rgba(255,255,255,.06)}

.tb-step{flex:1;text-align:center;color:rgba(255,255,255,.55);font-size:10.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;font-family:var(--display)}
.tb-step b{color:var(--brass-light);font-family:var(--display);font-style:italic;font-size:17px;font-weight:600;margin:0 3px;letter-spacing:0}

.tb-btns{display:flex;gap:6px;flex-wrap:wrap}
.tb-btns button{padding:7px 13px;border:none;font-size:11.5px;font-weight:600;cursor:pointer;font-family:var(--serif);white-space:nowrap;transition:all .2s;letter-spacing:.5px;border-radius:0}
#bprev,#bpreview{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.22)}
#bprev:hover,#bpreview:hover{border-color:var(--brass-light);color:var(--brass-light)}
#bnext{background:var(--brass-light);color:var(--navy-deep);border:1px solid var(--brass-light)}
#bnext:hover{background:#E1B85F;border-color:#E1B85F}
#bdl{background:var(--brass);color:#fff;border:1px solid var(--brass-deep);box-shadow:0 1px 0 rgba(0,0,0,.1) inset}
#bdl:hover:not(:disabled){background:var(--brass-deep)}
#bdl:disabled{background:#3a3a3a;color:#777;cursor:not-allowed;border-color:#333}

.prog{height:2px;background:rgba(201,164,74,.1);position:relative;overflow:hidden}
.pf{height:100%;background:var(--brass-light);transition:width .5s cubic-bezier(.65,.05,.36,1);box-shadow:0 0 4px rgba(201,164,74,.4)}

/* ════════ Wrap & Cards ════════ */
.wrap{max-width:640px;margin:0 auto;padding:18px 14px 36px}

.card{background:var(--paper);padding:22px 22px 18px;box-shadow:var(--shadow-soft);margin-bottom:14px;animation:fu .4s cubic-bezier(.2,.8,.2,1);border:1px solid var(--line);position:relative}
.card::after{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;border:1px solid var(--line-soft);pointer-events:none;opacity:.6}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.ch{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line);position:relative}
.ch::after{content:'';position:absolute;bottom:-1px;left:0;width:48px;height:1px;background:var(--brass)}
.sb{background:var(--cream-deep);color:var(--navy);width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-style:italic;font-size:18px;font-weight:600;flex-shrink:0;border:1px solid var(--brass-light);letter-spacing:.5px;line-height:1}
.sb[style*="line-height:1.3"]{font-size:13px;line-height:1.2}
.ch h2{font-size:17px;color:var(--ink);font-weight:700;letter-spacing:.5px;font-family:var(--serif);line-height:1.3}
.ch small{font-size:11px;color:var(--ink-soft);display:block;margin-top:4px;font-weight:500;font-family:var(--sans);letter-spacing:.3px;line-height:1.5}

/* ════════ Form Controls ════════ */
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
label{display:block;font-size:10px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:1.5px;font-family:var(--display)}
.req::after{content:' *';color:#A8453A;font-style:italic}

input[type=text],input[type=email],input[type=tel]{width:100%;padding:10px 13px;border:1px solid var(--line-strong);font-size:14px;font-family:var(--sans);color:var(--ink);background:var(--cream);outline:none;display:block;transition:all .25s;border-radius:0}
input:focus{border-color:var(--brass);background:#fff;box-shadow:0 0 0 3px rgba(168,133,58,.08)}

textarea.tf{width:100%;padding:13px 15px;border:1px solid var(--line-strong);font-size:14px;font-family:var(--sans);color:var(--ink);background:var(--cream);outline:none;display:block;resize:vertical;line-height:1.9;min-height:130px;transition:all .25s;border-radius:0}
textarea.tf:focus{border-color:var(--brass);background:#fff;box-shadow:0 0 0 3px rgba(168,133,58,.08)}
::placeholder{color:#B8AE9C;opacity:1}

/* ════════ Traits ════════ */
.traits-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:6px}
.trait-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--line-strong);cursor:pointer;font-size:13px;color:var(--ink);background:var(--cream);transition:all .2s;font-weight:500}
.trait-item:hover{border-color:var(--brass);background:var(--brass-mist)}
.trait-item.on{border-color:var(--navy);background:var(--cream-deep);color:var(--navy);font-weight:600}
.trait-item .ck{width:14px;height:14px;border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;border-radius:0}
.trait-item.on .ck{background:var(--navy);border-color:var(--navy);color:var(--brass-light)}
.trait-item.on .ck::after{content:'✓';font-size:10px;font-weight:900}

/* ════════ Example Button ════════ */
.ex-btn{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--brass);color:var(--brass-deep);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--serif);margin-bottom:10px;transition:all .25s;letter-spacing:.5px;border-radius:0;position:relative}
.ex-btn:hover{background:var(--brass);color:#fff}
.ex-btn .ex-spark{font-size:11px;font-family:var(--display);font-style:italic;color:var(--brass-light)}
.ex-btn:hover .ex-spark{color:#fff}

/* ════════ Image Upload Zone ════════ */
.iz-wrap{background:var(--cream);border:1px dashed var(--line-strong);padding:11px;transition:all .25s}
.iz-wrap:hover{border-color:var(--brass);background:var(--brass-mist)}
.iz-wrap.has{border-style:solid;border-color:var(--brass);background:var(--brass-mist)}
.iz-hint{font-size:10.5px;color:var(--ink-soft);margin-bottom:8px;display:flex;align-items:center;gap:7px;font-weight:500;font-family:var(--sans);letter-spacing:.3px}
.iz-hint .iz-tag{background:var(--navy);color:var(--brass-light);font-size:9px;padding:2px 7px;font-weight:700;letter-spacing:1px;font-family:var(--display);text-transform:uppercase}
.iz-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.iz-item{position:relative;background:#fff;border:1px solid var(--line-strong);padding:5px;height:84px;overflow:hidden}
.iz-item img{width:100%;height:100%;object-fit:contain;display:block;background:var(--cream)}
.iz-rm{position:absolute;top:4px;right:4px;background:var(--ink);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;font-weight:700;line-height:20px;text-align:center;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.iz-rm:hover{background:#A8453A}
.iz-add{display:flex;flex-direction:column;align-items:center;justify-content:center;height:84px;border:1px dashed var(--line-strong);cursor:pointer;background:#fff;color:var(--ink-soft);transition:all .25s;user-select:none}
.iz-add:hover{border-color:var(--navy);background:var(--cream-deep);color:var(--navy)}
.iz-add-icon{font-size:20px;font-weight:300;line-height:1;margin-bottom:4px;font-family:var(--display)}
.iz-add-txt{font-size:10.5px;font-weight:500;letter-spacing:.5px;font-family:var(--sans)}
input[type=file]{display:none}

/* ════════ Notice ════════ */
.notice{background:linear-gradient(135deg,var(--navy-deep),var(--navy));color:#fff;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:14px;font-size:13px;box-shadow:var(--shadow-soft);position:relative;overflow:hidden;border:1px solid var(--brass-deep)}
.notice::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--brass-light),var(--brass),var(--brass-light))}
.notice .ico{font-size:24px;flex-shrink:0;font-family:var(--display);color:var(--brass-light)}
.notice h3{font-size:14px;margin-bottom:4px;font-weight:700;letter-spacing:.5px;font-family:var(--serif)}
.notice p{font-size:12px;opacity:.85;line-height:1.5}
.notice .tag{font-size:10.5px;color:var(--brass-light);margin-top:5px;font-weight:600;letter-spacing:.5px;font-family:var(--display)}

/* ════════ Modals ════════ */
#exmodal{display:none;position:fixed;inset:0;z-index:300;background:rgba(26,22,18,.55);align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(6px)}
#exmodal.show{display:flex;animation:fade .25s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
#exbox{background:var(--cream);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.4);animation:popin .3s cubic-bezier(.2,.8,.2,1);border:1px solid var(--brass)}
@keyframes popin{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ex-hd{background:var(--navy-deep);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1;border-bottom:1px solid var(--brass)}
.ex-hd h3{color:#fff;font-size:15px;font-family:var(--serif);font-weight:600;letter-spacing:.5px}
.ex-hd small{color:var(--brass-light);font-size:10.5px;display:block;margin-top:3px;font-weight:500;letter-spacing:1px;font-family:var(--display);font-style:italic}
#exclosebtn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;font-family:var(--serif);border-radius:0}
#exclosebtn:hover{border-color:var(--brass-light);color:var(--brass-light)}
.ex-body{padding:18px;background:var(--cream)}
.ex-intro{font-size:12.5px;color:var(--navy);margin-bottom:15px;font-weight:500;background:var(--brass-mist);padding:11px 14px;border-left:2px solid var(--brass);line-height:1.6;font-family:var(--sans)}

.ex-item{border:1px solid var(--line-strong);padding:16px 17px;margin-bottom:12px;cursor:pointer;transition:all .25s;background:#fff;position:relative;overflow:hidden}
.ex-item::before{content:'';position:absolute;top:0;left:0;bottom:0;width:0;background:var(--brass);transition:width .25s}
.ex-item:hover{border-color:var(--brass);transform:translateY(-1px);box-shadow:0 6px 18px rgba(168,133,58,.12)}
.ex-item:hover::before{width:3px}
.ex-num{font-size:9.5px;font-weight:600;color:var(--ink-soft);background:transparent;padding:0 0 4px 0;display:inline-block;margin-bottom:6px;letter-spacing:2px;font-family:var(--display);text-transform:uppercase;border-bottom:1px solid var(--brass)}
.ex-tag{font-size:11.5px;font-weight:700;color:var(--navy);background:transparent;padding:2px 0;display:inline-block;margin-bottom:10px;margin-left:10px;font-family:var(--serif);letter-spacing:.3px}
.ex-text{font-size:13px;color:var(--ink);line-height:1.95;white-space:pre-wrap;font-family:var(--sans)}
.ex-hint{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:12px;padding:10px;font-weight:500;font-family:var(--display);font-style:italic;letter-spacing:.5px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}

#pvmodal{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,23,41,.96);flex-direction:column}
#pvmodal.show{display:flex;animation:fade .25s ease}
#pvtop{background:var(--navy-deep);padding:12px 16px;display:flex;align-items:center;gap:11px;flex-shrink:0;border-bottom:1px solid var(--brass)}
#pvtop span{color:var(--brass-light);font-size:14px;font-weight:600;flex:1;font-family:var(--serif);letter-spacing:.5px}
#pvclosebtn{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3);padding:7px 16px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;font-family:var(--serif);border-radius:0}
#pvclosebtn:hover{border-color:var(--brass-light);color:var(--brass-light)}
#pvbody{flex:1;overflow-y:auto;padding:30px 12px;display:flex;flex-direction:column;align-items:center;gap:30px}
.pv-lbl{color:var(--brass-light);font-size:11px;margin-bottom:9px;text-align:center;font-weight:600;letter-spacing:3px;font-family:var(--display);font-style:italic;text-transform:uppercase}
.pv-outer{overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.6),0 0 0 1px rgba(201,164,74,.3)}

/* ════════ Loading ════════ */
#lo{display:none;position:fixed;inset:0;background:rgba(15,23,41,.92);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#lo.show{display:flex}
.lc{background:var(--cream);padding:32px 42px;text-align:center;min-width:240px;box-shadow:0 32px 72px rgba(0,0,0,.45);border:1px solid var(--brass);position:relative}
.lc::before{content:'';position:absolute;top:-1px;left:0;right:0;height:2px;background:var(--brass-light)}
.ring{width:48px;height:48px;border:4px solid var(--line);border-top:4px solid var(--navy);border-right:4px solid var(--brass);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.lc h3{font-size:15px;color:var(--navy);margin-bottom:6px;font-weight:600;font-family:var(--serif);letter-spacing:.5px}
.lc p{font-size:12px;color:var(--ink-soft)}
#lst{font-size:11.5px;color:var(--brass-deep);margin-top:9px;font-weight:600;letter-spacing:1px;font-family:var(--display);font-style:italic}

/* ════════ Hero Mark (first card) ════════ */
.hero-mark{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--line);position:relative}
.hero-mark::after{content:'';position:absolute;bottom:-1px;left:0;width:60px;height:1px;background:var(--brass)}
.hero-mark-emblem{width:48px;height:48px;border:1px solid var(--brass);display:flex;align-items:center;justify-content:center;color:var(--brass-deep);background:var(--cream);font-family:var(--display);font-weight:600;font-size:24px;font-style:italic;flex-shrink:0;position:relative}
.hero-mark-emblem::before,.hero-mark-emblem::after{content:'';position:absolute;width:6px;height:6px;border:1px solid var(--brass)}
.hero-mark-emblem::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.hero-mark-emblem::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.hero-mark-text{flex:1;min-width:0}
.hero-mark-text .l1{font-size:9.5px;color:var(--ink-light);letter-spacing:3px;font-weight:600;margin-bottom:4px;font-family:var(--display);text-transform:uppercase}
.hero-mark-text .l2{font-size:16px;color:var(--ink);font-weight:700;font-family:var(--serif);letter-spacing:.5px;line-height:1.3}
.hero-mark-text .l3{font-size:11.5px;color:var(--brass-deep);font-weight:500;margin-top:4px;letter-spacing:.5px;font-style:italic;font-family:var(--display)}

/* Mobile tweaks */
@media (max-width:480px){
  .tb-tt{font-size:12px}
  .tab{padding:6px 10px;font-size:11px}
  .tb-btns button{padding:6px 11px;font-size:11px}
  .traits-grid{grid-template-columns:1fr}
  .wrap{padding:14px 12px 28px}
  .card{padding:18px 18px 14px}
  .card::after{top:6px;left:6px;right:6px;bottom:6px}
  .ch h2{font-size:15px}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb-inner">
    <div class="tb-row">
      <div class="tb-brand">
        <div class="tb-mark" id="tb-mark">I</div>
        <div class="tb-tt">朝陽科大 企業管理系<small>APPLICATION DOCUMENT BUILDER</small></div>
      </div>
    </div>
    <div class="tb-row">
      <div class="tb-tabs">
        <button class="tab on" data-doc="0">D1 多元表現</button>
        <button class="tab" data-doc="1">D2 學習歷程</button>
        <button class="tab" data-doc="2">D3 有利資料</button>
      </div>
    </div>
    <div class="tb-row">
      <div class="tb-step" id="si">步驟 <b>1</b> / <b>6</b></div>
      <div class="tb-btns">
        <button id="bprev">‹ 上一步</button>
        <button id="bnext">下一步 ›</button>
        <button id="bpreview">👁 預覽</button>
        <button id="bdl">📄 下載 PDF</button>
      </div>
    </div>
  </div>
  <div class="prog"><div class="pf" id="fill"></div></div>
</div>

<div class="wrap"><div id="fc"></div></div>

<div id="exmodal">
  <div id="exbox">
    <div class="ex-hd">
      <div><h3 id="ex-title">參考範例</h3><small>選一份填入後，依自己真實經歷修改</small></div>
      <button id="exclosebtn">✕ 關閉</button>
    </div>
    <div class="ex-body" id="ex-body"></div>
  </div>
</div>

<div id="pvmodal">

  c2:[
    {tag:'商業科 — 社團＋財經社',text:'高一至高二：羽球社\n每週固定訓練與校內聯賽，在雙打練習中學會與隊友有效溝通與分工，培養抗壓性與應變能力。\n\n高二起：投資理財研究社（副社長）\n學習股票、基金、複利計算等基礎財務知識，並實際操作虛擬投資組合。擔任副社長期間協助規劃每月主題課程，提升社員參與度與學習興趣。\n\n兩段社團經歷讓我體會溝通協調與計畫執行的重要，也確立了對企業管理知識的學習興趣。'},
    {tag:'學科型 — 科學社＋服務社',text:'高一至高二：自然科學研究社\n定期進行小組實驗與成果發表，在討論分工中培養邏輯思考與團隊合作的能力。曾代表學校參加縣市科展，學習完整的研究設計流程。\n\n高三：服務學習社（副社長）\n協助社長統籌校內外公益活動，負責招募社員、規劃課程與協調志工時間。這段經歷讓我理解組織管理的挑戰，也激發了我對企業管理系的嚮往。'},

    {tag:'課輔＋校內服務型',text:'課輔小老師\n連續兩年擔任低年級同學的數學與商業概論課輔小老師，練習將複雜概念化繁為簡，同時培養耐心與因材施教的能力。這段經驗讓我對「教學即管理」有深刻體悟。\n\n圖書館志工\n每週一次協助整理館藏、引導同學借閱，養成系統化分類與細心查核的習慣。\n\n班際活動籌備志工\n協助學校運動會場地佈置與秩序維持，在高壓現場中磨練應變與配合團隊的能力。\n\n三年累計服務時數共 58 小時。'},

  d1conc:[
    {tag:'完整統整型',text:'三年高中生活，我從不同角色累積了扎實的學習歷程。擔任幹部讓我學會領導與溝通，社團活動培養了對財務與組織管理的興趣，服務學習讓我理解換位思考的重要，競賽與課業表現強化了邏輯思維與抗壓能力。\n\n在這些多元歷練中，我逐漸確立了一個明確方向：對「如何讓組織有效運作」充滿好奇，對商業決策背後的思維邏輯深感著迷。\n\n進入朝陽科技大學企業管理系後，我期許自己能將高中累積的實務態度帶入更系統化的專業學習，透過實習機會、產業講座與專題研究，培養兼具理論基礎與實踐能力的管理視野。'},
    {tag:'成長導向型',text:'如果要用一句話概括我的高中三年，我想說：「我學會了從事情裡學習，而不只是從課本裡學習。」\n\n從高一的股長到高三的班長，從旁觀社團到擔任副社長，每一個角色轉換都給了我不同的視角。我發現，真正的管理不是發號施令，而是了解每個人的強項，找到讓團隊發揮最大效能的方法。\n\n這個體悟讓我對企業管理這個領域產生了濃厚的興趣。我希望在朝陽科技大學企業管理系的學習中，深化這些直覺性的理解，建立更完整的管理知識體系，成為一個真正懂得帶領人、創造價值的管理者。'},
    {tag:'目標清晰型',text:'高中三年，我透過幹部歷練、社團經驗、服務學習與競賽參與，具體確立了未來的目標——成為一名具備實務能力與創新思維的企業管理人才。\n\n幹部工作讓我理解決策的重量；社團讓我接觸財務與活動規劃的實際挑戰；服務讓我學會同理與回應需求；競賽則讓我在壓力中磨練表達與解決問題的能力。\n\n我選擇朝陽科技大學企業管理系，是因為系上強調理論與實務的整合，正是我認為踏入職場前最需要的訓練。我期待在這裡深耕專業知識，透過業師合作與實習機會，為自己的職涯奠定紮實的根基。'},

  d2bio:[
    {tag:'家庭背景驅動型',text:'從小在民主的家庭環境成長，父母給予充分的自主空間，但也要求我學會對自己負責。這樣的成長背景讓我養成獨立思考與承擔責任的習慣，在遇到困難時不輕易放棄，而是主動尋找解決方法。\n\n國中畢業後毫不猶豫選擇高職商業科，是因為商業管理的廣度與深度深深吸引著我。透過新聞與親友的商業背景，我認識到商業知識的無限可能，這份好奇心驅使我投入三年的系統學習。\n\n在高中三年中，除了努力學業，也積極參與社團、幹部與服務活動，從每一段經歷中理解「管理」的真實意涵——不只是數字與決策，更是對人的理解與關懷。'},
    {tag:'自主探索成長型',text:'我是一個喜歡主動探索的人。國小時就習慣在圖書館翻閱各種書籍，對於「為什麼有些企業會成功、有些卻失敗」充滿好奇。這份對商業世界的疑問，成為驅動我選擇商業科的最初動力。\n\n進入高職後，我努力將課堂知識與日常觀察結合：逛超市時分析陳設邏輯、看新聞時思考企業策略、在社團中嘗試活動企劃。這些習慣讓我養成了系統性思考的能力，也讓我逐漸確信，企業管理是我想深入學習的領域。\n\n三年下來，我從一個對商業充滿問號的學生，成長為能用管理視角分析問題的人。這段歷程讓我更清楚自己的方向，也更期待在大學中接受更嚴謹的訓練。'},
    {tag:'從興趣到使命型',text:'我來自一個重視教育的家庭，父母從不要求我考多高的分數，但總會問：「你今天學到什麼？」這樣的氛圍養成了我把學習當成日常、而不是任務的習慣。\n\n國中時，因為一次社區活動的契機，我接觸到「行銷」這個概念，開始好奇為什麼一個產品能讓人主動掏錢、而另一個只能躺在貨架上。這份好奇心引領我選擇商業科，並在三年的學習中逐步從興趣變成志向。\n\n我希望未來能成為一個真正了解商業運作、並能為社會帶來正面改變的管理者，這也是我選擇朝陽科技大學企業管理系最深層的原因。'},
  ],
  d2motive:[
    {tag:'課程興趣觸發型',text:'選擇就讀企業管理系的動機，源自高中三年累積的商業學習體驗。在商業概論課程中，第一次系統性接觸行銷、財務、人資等管理概念，發現這些知識與日常生活的連結遠比想像中緊密。\n\n在研究朝陽科技大學企業管理系的過程中，注意到系上重視理論與實務的整合，提供豐富的產業合作機會與業師輔導資源。這與我希望同步累積實務經驗的期望高度契合。\n\n進入企管系後，計畫積極修習行銷管理與財務相關課程，爭取校外實習機會，並參與系上舉辦的各類產業講座，為未來進入職場奠定紮實基礎。'},
    {tag:'親身觀察激發型',text:'我對企業管理的興趣，並非來自課本，而是來自日常的觀察與思考。家人在地方上經營小型餐飲店，我從小就在旁協助，觀察到從進貨管理、客戶服務到員工排班，每個環節都牽涉到系統性的決策與資源分配。這讓我意識到，即使是小型商業也充滿了管理的學問。\n\n選擇朝陽科技大學企業管理系，是因為系上兼顧理論基礎與實務訓練，讓我能在紮實的學科背景下，透過個案分析與實習，真正理解企業運作的全貌。\n\n進入系所後，我期望能夠累積足夠的專業知識，回頭幫助家人優化營運模式，也為自己未來進入管理職位打下堅實根基。'},
    {tag:'實務導向型',text:'高中三年的幹部經驗讓我體會到，管理不只是書本上的章節，而是在資源有限、時間緊迫下，如何把對的人放在對的位置上。每一次活動籌備、每一次衝突協調，都讓我更想深入了解管理背後的邏輯。\n\n選擇朝陽科技大學企業管理系，最直接的理由是它強調「做中學」的教學取向。系上的業師制度、企業參訪與實習合作，讓我有機會在大學階段就接觸真實的企業現場。\n\n我期待透過系上完整的訓練，把高中的實作直覺，轉化為更專業、更可被檢驗的管理能力。'},
  ],
  d2g1t:[
    {tag:'從理論到實作型',text:'這門課讓我第一次體會到課本知識如何轉化為實際應用。課堂上學到的概念框架，原本看似抽象，但在實作專題中親自操作後，才真正理解每一個步驟背後的意義。\n\n最大的收穫不是分數，而是學會了主動將理論連結到日常觀察，培養出「凡事都能用學科視角分析」的思維習慣，這對我後續學習其他商業課程帶來了深遠的影響。'},
    {tag:'從困難到突破型',text:'這門課一開始對我而言並不容易，公式運算與案例分析並進，常常在練習題上卡關。我嘗試建立自己的筆記系統：每讀完一個章節就用自己的話寫一份摘要，並把不懂的部分整理成問題清單向老師請教。\n\n經過一個學期的累積，我從成績中段慢慢進步到班級前 20%。這段過程讓我體會到，遇到困難不是放棄的理由，而是建立學習方法的契機。'},
    {tag:'從興趣到深化型',text:'這門課是我接觸管理知識的起點。隨著學期推進，我對課程內容的興趣不減反增，主動延伸閱讀相關書籍與案例報導，也開始觀察日常生活中的商業現象。\n\n這份興趣讓我願意花更多時間投入，最後不只在學科表現上有所成長，也對自己未來的學習方向產生更明確的方向感——我發現自己真正想做的，是在企業管理領域繼續深耕。'},
  ],
  d2g2t:[
    {tag:'扎實累積型',text:'這門課強調穩定的累積與細心的求證。我習慣在每堂課後立即整理筆記，並用例題自我練習，把容易混淆的觀念用對比表格呈現。\n\n這段學習過程不只讓我掌握了學科內容，更讓我建立了一套可遷移的學習方法——把複雜知識拆解、分類、再重組。這份能力後來在其他課程上同樣派上用場。'},
    {tag:'觀察應用型',text:'這門課讓我學會用學科視角觀察周遭世界。每次學到新概念，我都會試著在生活中找對應的例子：例如逛便利商店時觀察陳列邏輯、看新聞時思考企業決策。\n\n這種「從生活找學問」的習慣，讓抽象的理論變得具體，也讓我體會到商業學科的實用價值——知識不只是考試題目，而是真正可用來理解世界的工具。'},
    {tag:'反思內化型',text:'這門課最大的挑戰，不是內容難度，而是如何把所學內化為自己的觀點。課程中老師常拋出開放性問題，鼓勵我們表達看法。\n\n剛開始我會擔心答錯，但漸漸地，我學會在發言前先沉澱、整理思路，並用結構化的方式表達。這段訓練讓我在後續課程的個案討論與報告呈現上，都能更有條理地論述自己的想法。'},
  ],
  d2g3t:[
    {tag:'團隊合作型',text:'這門課透過大量的小組合作完成階段性報告。一開始我們組內分工不清，常因進度落差產生摩擦。於是我主動提議建立共享的進度表與週會制度，讓每個人都清楚自己的責任與時程。\n\n這段經驗讓我學到，團隊合作的核心不是「我做了多少」，而是「我如何讓整個團隊運轉得更順」。這份理解，正是企業管理最核心的課題之一。'},
    {tag:'解決問題型',text:'這門課讓我第一次完整經歷「發現問題—分析原因—提出解法—驗證成效」的思考流程。我學會在面對任何題目時，不急著答題，而是先把問題拆解清楚。\n\n這套思維方式不只用在學科上，也滲透到我日常的決策——選社團、規劃時間、處理人際——都讓我變得更有條理。'},
    {tag:'跨域整合型',text:'這門課讓我意識到，商業知識並不是孤立存在，而是與資訊科技、社會議題、消費心理交織在一起。我嘗試把其他課程學到的概念帶入這門課的作業中，例如用社會學視角分析消費者行為。\n\n這種跨領域的整合練習，讓我體會到企業管理的多元性，也激發了我未來想在大學接觸更廣泛知識的渴望。'},
  ],
  d2c1t:[
    {tag:'多元選修型',text:'這門課程結合了實務操作與業師授課，讓我接觸到課本以外的商業現場。\n\n印象最深的是模擬經營一家小型零售店，從定位、選品、訂價到行銷文案，每個決策都牽涉到資源分配與消費者洞察。在過程中，我深刻體會到商業決策從來不是單一答案，而是在多個變數中找出最佳解的能力。\n\n這段經驗讓我更確信自己對企業管理的興趣，也學到了許多書本無法傳達的實務智慧。'},
    {tag:'自主學習型',text:'我選擇以「中小企業數位轉型」作為自主學習主題，從定義範圍、文獻搜集、案例分析到產出書面報告，全程自己規劃與執行。\n\n這個過程最大的挑戰是時間管理——沒有人在後面催進度，必須自己設定階段性目標並嚴格自律。最終我完成一份近 8000 字的報告，被老師肯定為班級代表作品。\n\n這段歷程讓我培養了獨立研究的能力，也驗證了自己面對長期任務的執行力。'},
    {tag:'小論文型',text:'我與兩位同學共同完成了「台灣手搖飲品牌策略比較」的小論文。我們從消費者問卷設計、訪談、資料分析到報告撰寫，分工合作完成。\n\n我負責問卷設計與資料分析的部分，學會了基本的統計方法與圖表呈現技巧。最重要的收穫是，原來商業研究可以這麼嚴謹——每一個結論背後都需要證據支撐。\n\n這份小論文最終獲得校內優等獎，也激發了我對學術研究的興趣。'},
  ],
  d2c2t:[
    {tag:'實作工作坊型',text:'這門課是與業師合作的實務工作坊，我們有機會走進真實的企業環境參訪。\n\n令我印象最深的是一場「企業簡報模擬」——我們以實際公司為對象，準備一份提案簡報並向業師發表。從資料蒐集、簡報架構、視覺設計到口頭表達，每個環節都讓我看到自己的不足，也得到了非常具體的回饋。\n\n這段經驗讓我學會了「站在客戶角度思考」的重要性，也大幅提升了我的簡報能力與商業敏感度。'},
    {tag:'專題研究型',text:'這門課要求每組完成一份完整的專題研究報告。我們組選擇「永續品牌的消費者認知差異」作為主題。\n\n我擔任資料分析組長，負責設計問卷並用 Excel 進行交叉分析。這段經驗讓我第一次接觸到較進階的資料處理工具，也學會用視覺化方式呈現研究結果。\n\n最後我們的報告獲得班級評選第二名，這次經驗讓我對量化研究產生了更高的興趣，也是我希望在大學進一步深化的方向。'},
    {tag:'創意實作型',text:'這門課強調動手做。我們需要在學期內提出一個原創的商業企劃，並實際嘗試小規模測試。\n\n我與組員選擇了「校園文具二手交流」的點子，從社群行銷、訂價策略到實際擺攤，全程都由我們自主規劃。雖然最後的營業額不高，但我們完整經歷了一次「從想法到行動」的商業循環。\n\n這份經驗讓我體會到，創業與管理需要的不只是好點子，更是把點子落地的執行力與堅持。'},
  ],
  d2plan:[
    {tag:'具體分項計畫型',text:'持續強化英語能力\n目標通過全民英檢中高級，累積學術與商業英文閱讀能力，為未來接觸國際商業資訊與個案做好準備。\n\n爭取校外實習\n希望在大二或大三時爭取企業實習機會，優先考慮行銷、業務或財務相關職位，將課堂知識轉化為實際工作能力。\n\n深化專業知識\n積極參與系上及校內的創業講座、產業論壇與學術研討活動，拓展視野並建立人脈。\n\n取得專業證照\n規劃在校期間考取商業類相關證照（如企業管理師、行銷認證），強化履歷競爭力。'},
    {tag:'全方位發展型',text:'學術與研究面\n希望在大二加入系上研究室或參與教師研究計畫，培養資料分析與學術寫作能力，為未來升學或企業研發崗位做準備。\n\n實務與職涯面\n積極爭取業界實習機會，從基層業務或行政工作中累積一線經驗，理解組織運作的實際挑戰。\n\n語言與國際視野\n持續深化英語能力，並評估修讀商業日語或選修國際企業管理相關課程，拓展未來跨國合作的可能性。\n\n社群與人脈面\n參與系學會、創業社團等校內組織，與來自不同科系的同學合作，培養跨領域整合能力。'},
    {tag:'目標導向型',text:'我為自己設定了三個階段性目標：\n\n大一：扎根期\n打好專業基礎課程，並通過英檢中高級。同時加入系學會擔任幹部，熟悉系上資源與生態。\n\n大二至大三：實戰期\n爭取至少一次正式企業實習，並參與一次跨校的商業競賽。同時透過選修課程確認未來專長方向。\n\n大四：整合期\n完成專題研究，並評估升學或就業方向。希望以扎實的作品集（實習成果＋競賽紀錄＋專題）為自己的大學生涯做最好的總結。'},
  ],
  d2reflect:[
    {tag:'成長轉變型',text:'三年來從被動學習者成長為主動思考與積極實踐的行動者，是我最珍貴的改變。\n\n幹部經驗讓我學會如何領導團隊、溝通協調並解決問題；社團活動培養了分工合作與規劃活動的能力；學習過程中，我清楚知道自己想要什麼，態度是我最大的資產。\n\n在這些歷程中，不斷反思並逐步確立升學方向，確信朝陽科技大學企業管理系將是我發展潛力、實現目標的最佳選擇。'},
    {tag:'積極展望型',text:'回顧高中三年，我在學業、社團、服務與競賽各個面向的努力，雖然成果不一定最亮眼，但每一段過程都讓我更了解自己的能耐與缺口。\n\n我認識到，管理能力不只是技術，更是一種思維方式——在資源有限的情況下做出最好的決策，並持續修正方向。這正是我在每一次幹部任期、每一次活動籌備中反覆體驗的核心。\n\n進入朝陽科技大學企業管理系後，我不只希望習得專業知識，更期待透過與教授、業師、同學的互動，持續打磨自己的思考框架，成為一個在商業環境中能夠創造真實價值的人。'},
    {tag:'結語有力型',text:'三年的學習，最大的收穫不是某一張證書、某一個獎項，而是學會了「對自己誠實」這件事。\n\n我清楚自己擅長什麼、不足什麼；清楚自己對哪些事情真心好奇、對哪些只是表面興趣。這份自我認識，讓我選擇朝陽科技大學企業管理系時不是隨波逐流，而是經過深思熟慮的決定。\n\n我相信，帶著這份清醒進入大學，我能更專注、更主動、也更有方向地去吸收每一份知識，並把所學轉化成真正屬於自己的能力。'},
  ],

  d3lang:[
    {tag:'英檢中級型',text:'全民英語檢定中級——通過初試與複試（高二取得）\nGEPT 中級檢定證書，具備基礎英語讀、寫、聽、說能力。\n\n目前正積極準備中高級檢定，目標於大一上學期前取得，作為未來修習國際商業課程與閱讀英文文獻的基礎。'},
    {tag:'多益測驗型',text:'TOEIC 多益測驗——綜合分數 650 分（高三取得）\nListening 340 / Reading 310，具備一定的商業英文閱讀與聽力理解能力。\n\n預計大一升大二時再次應試，目標達到 750 分以上，符合進入外商企業實習的基本門檻。'},
    {tag:'多語檢定型',text:'全民英語檢定中級——通過（高二取得）\n日語檢定 N4——通過（高三取得，自學備考）\n\n語言學習對我而言不只是考試，更是接觸不同文化與商業思維的窗口。未來希望在大學期間持續精進英文，並評估加修商業日語，培養未來進入跨國企業的競爭力。'},
  ],
  d3awards:[
    {tag:'學業類獎項',text:'高一上學期：學業成績書卷獎（班排第三）\n高一下學期：學業成績書卷獎（班排第二）\n高二上學期：商業類專業科目組第一名\n高三：畢業總平均班級前 10%，獲頒成績優異獎\n\n這些獎項代表的不是聰明，而是穩定累積的學習態度。我相信這份自律是面對大學課業最重要的基礎。'},
    {tag:'競賽類獎項',text:'高二：全國商業類技藝競賽——優良獎\n高二：校內創意簡報競賽——優等獎（永續品牌主題）\n高二：縣市科展——商業類組佳作\n高三：全國高中生小論文比賽——入選\n高三：商業模式競賽——銀獎（共 60 隊參賽）\n\n每一次的競賽不只是一個結果，更是一次對自己思考能力與抗壓性的真實檢驗。'},
    {tag:'服務與綜合類',text:'高一：班級榮譽獎（衛生競賽連續四週第一）\n高二：服務楷模獎（服務時數累計 60 小時）\n高三：校內志工貢獻獎（累計服務時數超過 80 小時）\n高三：校長嘉獎（畢業籌備優秀貢獻）\n\n這些獎項不是榮耀，而是肯定——肯定我在團體中願意多付出一份心力的態度。'},
  ],

// 圖片區（最多 2 張）
function iz(key){
  var imgs=fd[key]||[];
  var has=imgs.length>0;
  var html='<div class="iz-wrap'+(has?' has':'')+'">';
  html+='<div class="iz-hint"><span class="iz-tag">最多 2 張</span>請選最重要的圖片（'+imgs.length+'/2）</div>';
  html+='<div class="iz-grid">';
  imgs.forEach(function(src,i){
    html+='<div class="iz-item">'
        +'<img src="'+src+'">'
        +'<button class="iz-rm" data-rm="'+key+'" data-rmi="'+i+'">✕</button>'
        +'</div>';
  });
  if(imgs.length<2){
    html+='<div class="iz-add" data-zone="'+key+'">'
        +'<div class="iz-add-icon">＋</div>'
        +'<div class="iz-add-txt">'+(imgs.length===0?'點擊上傳':'再加一張')+'</div>'
        +'</div>';
  }
  html+='</div></div>';
  html+='<input type="file" id="f_'+key+'" accept="image/*" data-for="'+key+'">';
  return html;
}

function render(){
  var forms=DOCS[doc]; var s=step[doc]; if(s>=forms.length)s=forms.length-1;
  document.getElementById('fc').innerHTML=forms[s]();
  document.getElementById('si').innerHTML='步驟 <b>'+(s+1)+'</b> / <b>'+TOTALS[doc]+'</b>';
  document.getElementById('fill').style.width=(((s+1)/TOTALS[doc])*100)+'%';
  document.getElementById('bprev').style.display=s===0?'none':'inline-block';
  document.getElementById('bnext').style.display=s===TOTALS[doc]-1?'none':'inline-block';
  document.getElementById('bdl').style.display=s===TOTALS[doc]-1?'inline-block':'none';
  document.getElementById('tb-mark').textContent=['I','II','III'][doc];

// 圖片上傳（多張）
document.addEventListener('change',function(e){
  var k=e.target.getAttribute('data-for'); if(!k) return;
  var file=e.target.files[0]; if(!file) return;
  var r=new FileReader();
  r.onload=function(ev){
    if(!Array.isArray(fd[k])) fd[k]=[];
    if(fd[k].length<2) fd[k].push(ev.target.result);
    e.target.value='';
    render();
  };
  r.readAsDataURL(file);
});

// 點擊事件
document.addEventListener('click',function(e){
  // 移除圖片
  var rm=e.target.getAttribute('data-rm'); var rmi=e.target.getAttribute('data-rmi');
  if(rm && rmi!==null && rmi!==undefined){e.stopPropagation(); fd[rm].splice(parseInt(rmi),1); render(); return;}
  // 上傳區
  var z=e.target.closest('[data-zone]');
  if(z){var k=z.getAttribute('data-zone'); var fi=document.getElementById('f_'+k); if(fi)fi.click(); return;}
  // 個人特質
  var tr=e.target.closest('[data-trait]');
  if(tr){var t=TRAITS[parseInt(tr.getAttribute('data-trait'))]; var idx=fd.d2traits.indexOf(t); if(idx>=0)fd.d2traits.splice(idx,1); else fd.d2traits.push(t); render(); return;}
  // 範例按鈕
  var ex=e.target.closest('[data-ex]');
  if(ex){openEx(ex.getAttribute('data-ex')); return;}
  // tab 切換
  var tab=e.target.closest('[data-doc]');
  if(tab && tab.classList.contains('tab')){doc=parseInt(tab.getAttribute('data-doc')); render(); window.scrollTo(0,0);}
});

document.getElementById('bdl').onclick=function(){genPDF();};

async function genPDF(){
  var btn=document.getElementById('bdl'); btn.disabled=true;
  var lo=document.getElementById('lo'); var lst=document.getElementById('lst'); lo.classList.add('show');
  try{
    if(!window.jspdf || !window.html2canvas) throw new Error('PDF 工具未載入，請重整頁面');
    var pages = doc===0?getD1Pages() : doc===1?getD2Pages() : getD3Pages();
    var pdf=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    for(var i=0;i<pages.length;i++){
      lst.textContent='生成 '+pages[i].l+'... ('+(i+1)+'/'+pages.length+')';
      if(i>0)pdf.addPage();
      var cv=await cap(pages[i].h);
      addWatermark(cv);
      pdf.addImage(cv.toDataURL('image/jpeg',.92),'JPEG',0,0,210,297);
    }
    lst.textContent='儲存中...';
    await new Promise(function(r){setTimeout(r,200);});
    pdf.save((fd.name||'申請人')+'_朝陽企管_'+['D1_多元表現','D2_學習歷程','D3_有利資料'][doc]+'.pdf');
  }catch(err){alert('錯誤：'+err.message);}
  finally{lo.classList.remove('show'); btn.disabled=false;}
}

async function cap(html){
  var d=document.createElement('div');
  d.style.cssText='position:fixed;left:-9999px;top:0;width:794px;height:1123px;overflow:hidden;background:white;z-index:-1';
  d.innerHTML=html;
  document.body.appendChild(d);
  await new Promise(function(r){setTimeout(r,180);});
  var cv=await html2canvas(d,{width:794,height:1123,scale:1.5,useCORS:true,allowTaint:true,backgroundColor:'#fff',logging:false});
  document.body.removeChild(d);
  return cv;
}

// 浮水印：朝陽企管，襯線斜向重複
function addWatermark(cv){
  var ctx=cv.getContext('2d');
  ctx.save();
  ctx.globalAlpha=0.045;
  ctx.fillStyle='#1E2A4A';
  var fs=Math.floor(cv.width*0.052);
  ctx.font='600 '+fs+'px "Noto Serif TC","Microsoft JhengHei",serif';
  var txt='朝陽企管';
  var tw=ctx.measureText(txt).width, gX=tw+90, gY=fs+105;
  for(var r=-3;r<14;r++){
    for(var c=-2;c<10;c++){
      ctx.save();
      ctx.translate(c*gX+cv.width*.04, r*gY+cv.height*.03);
      ctx.rotate(-Math.PI/5.5);
      ctx.fillText(txt,0,0);
      ctx.restore();
    }
  }
  ctx.restore();
}

// 內文段落（自動辨識小標）
function renderLines(content, opts){
  opts=opts||{};
  var fs=opts.fs||13.5, lh=opts.lh||1.95, hfs=opts.hfs||14.5;
  var lines=(content||'（未填寫）').split('\n');
  return lines.map(function(l){
    if(!l.trim()) return '<div style="height:9px"></div>';
    var isH = l.trim().length<=25 && !/[。，、）！？]$/.test(l.trim());
    return isH
      ? '<div style="font-size:'+hfs+'px;font-weight:700;color:'+C_NAVY+';margin:14px 0 6px;padding-left:11px;border-left:2px solid '+C_BRASS+';font-family:'+PAGE_SERIF+';letter-spacing:.5px">'+esc(l)+'</div>'
      : '<div style="font-size:'+fs+'px;line-height:'+lh+';color:'+C_INK+';margin:3px 0;font-family:'+PAGE_SANS+';text-align:justify">'+esc(l)+'</div>';

}

         + '<div style="font-family:'+PAGE_DISPLAY+';font-style:italic;font-size:13px;color:'+C_BRASS_DEEP+';letter-spacing:2px;font-weight:600">'+code+'</div>'
         + '<div style="font-size:18px;font-weight:700;color:'+C_INK+';font-family:'+PAGE_SERIF+';letter-spacing:1.5px;flex:1">'+title+'</div>'
         + '</div>'
         + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">'
         + '<div style="width:32px;height:1px;background:'+C_BRASS+'"></div>'
         + '<div style="flex:1;height:1px;background:'+C_LINE+'"></div>'
         + '</div>'
         + '<div style="display:flex;gap:18px;overflow:hidden">'
         + '<div style="width:'+txtW+';overflow:hidden">'+html+'</div>'
         + (hasImg ? imgBlock(imgs,{width:imgW, maxH1:235, maxH2:140, label:'Visual Evidence'}) : '')
         + '</div></div>';
  }
  return '<div style="width:794px;height:1123px;background:'+C_PAPER+';position:relative;overflow:hidden;font-family:'+PAGE_SERIF+'">'
       // 簡約頂條
       + '<div style="height:5px;background:'+C_BRASS+'"></div>'
       + '<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 48px;border-bottom:1px solid '+C_LINE+'">'
       + '<div style="font-family:'+PAGE_DISPLAY+';font-size:10.5px;color:'+C_INK_LIGHT+';letter-spacing:3.5px;text-transform:uppercase;font-style:italic">朝陽科技大學 · 企業管理系</div>'
       + '<div style="font-family:'+PAGE_DISPLAY+';font-size:11px;color:'+C_BRASS_DEEP+';letter-spacing:1.5px"><span style="font-style:italic">'+pg+'</span> / '+total+'</div>'
       + '</div>'
       + half(cA, tA, conA, imgA)
       // 中央分隔
       + '<div style="margin:18px 48px;display:flex;align-items:center;gap:12px">'
       + '<div style="flex:1;height:1px;background:'+C_LINE_STRONG+'"></div>'
       + '<div style="font-family:'+PAGE_DISPLAY+';font-size:11px;color:'+C_BRASS_DEEP+';letter-spacing:3px;font-style:italic">·  ·  ·</div>'
       + '<div style="flex:1;height:1px;background:'+C_LINE_STRONG+'"></div>'
       + '</div>'
       + half(cB, tB, conB, imgB)
       + pageFooter(pg, total)
       + '</div>';
}

// ─────────────────────────────────────────────────────────
//   pConc — 結論頁（D1/D2 結尾）
// ─────────────────────────────────────────────────────────
function pConc(dcode, dtitle, content, pg, total){
  var html = renderLines(content,{fs:14, lh:2, hfs:15});
  return '<div style="width:794px;height:1123px;background:'+C_CREAM+';position:relative;overflow:hidden;font-family:'+PAGE_SERIF+'">'
       // 頂部裝飾
       + '<div style="height:5px;background:'+C_BRASS+'"></div>'
       + '<div style="padding:42px 48px 0;text-align:center">'
       + '<div style="font-family:'+PAGE_DISPLAY+';font-style:italic;font-size:11px;color:'+C_BRASS_DEEP+';letter-spacing:5px;text-transform:uppercase;margin-bottom:8px">— Conclusion —</div>'
       + '<h1 style="font-size:28px;font-weight:700;color:'+C_INK+';letter-spacing:5px;font-family:'+PAGE_SERIF+';margin-bottom:14px">'+dtitle+'</h1>'
       + '<div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:24px">'
       + '<div style="width:36px;height:1px;background:'+C_BRASS+'"></div>'
       + '<div style="width:5px;height:5px;background:'+C_BRASS+';transform:rotate(45deg)"></div>'
       + '<div style="width:36px;height:1px;background:'+C_BRASS+'"></div>'
       + '</div>'
       + '</div>'
       // 申請人資訊小條
       + '<div style="margin:0 48px 20px;padding:11px 18px;background:'+C_PAPER+';border:1px solid '+C_LINE_STRONG+';display:flex;align-items:center;gap:14px">'
       + '<div style="width:34px;height:34px;border:1px solid '+C_BRASS+';display:flex;align-items:center;justify-content:center;color:'+C_BRASS_DEEP+';font-family:'+PAGE_DISPLAY+';font-style:italic;font-size:18px;font-weight:600;flex-shrink:0;background:'+C_CREAM+'">'+(esc(fd.name)||'？')[0]+'</div>'
       + '<div style="flex:1">'
       + '<div style="font-size:14px;font-weight:700;color:'+C_NAVY+';font-family:'+PAGE_SERIF+';letter-spacing:1px">'+(esc(fd.name)||'申請人')+'</div>'
       + '<div style="font-size:10.5px;color:'+C_INK_LIGHT+';margin-top:2px;font-family:'+PAGE_DISPLAY+';font-style:italic;letter-spacing:1.5px">'+(esc(fd.school)||'')+' &nbsp;·&nbsp; '+(esc(fd.dept)||'')+'</div>'
       + '</div>'
       + '</div>'
       // 內文
       + '<div style="padding:8px 48px 78px;background:'+C_PAPER+';margin:0 48px;border:1px solid '+C_LINE+';height:'+(1123-200-58-32)+'px;overflow:hidden">'
       + '<div style="padding:24px 4px">' + html + '</div>'
       + '</div>'
       + pageFooter(pg, total)
       + '</div>';
}

// ─────────────────────────────────────────────────────────
//   pBio — D2 個人簡歷頁（左右雙欄）
// ─────────────────────────────────────────────────────────
function pBio(){
  var listItems = function(text){
    if(!text) return '<div style="font-size:11.5px;color:'+C_INK_LIGHT+';font-style:italic;font-family:'+PAGE_DISPLAY+';letter-spacing:1px">— Not Provided —</div>';
    return text.split('\n').map(function(l){
      return l.trim() ? '<div style="font-size:12.5px;color:'+C_INK+';padding:6px 0;border-bottom:1px dotted '+C_LINE_STRONG+';line-height:1.5;font-family:'+PAGE_SANS+'">'+esc(l)+'</div>' : '';
    }).join('');
  };
  var blockTitle = function(t,en){
    return '<div style="margin-bottom:10px">'
         + '<div style="font-family:'+PAGE_DISPLAY+';font-style:italic;font-size:9.5px;color:'+C_BRASS_DEEP+';letter-spacing:3px;text-transform:uppercase;margin-bottom:2px">— '+en+' —</div>'
         + '<div style="font-family:'+PAGE_SERIF+';font-size:14px;font-weight:700;color:'+C_NAVY+';letter-spacing:1.5px;padding-bottom:5px;border-bottom:1px solid '+C_BRASS+'">'+t+'</div>'
         + '</div>';
  };
  return '<div style="width:794px;height:1123px;background:'+C_PAPER+';position:relative;overflow:hidden;font-family:'+PAGE_SERIF+'">'
       + pageHeader('D2','個人簡歷','PROFILE')
       + '<div style="padding:28px 48px 78px;display:grid;grid-template-columns:1fr 1fr;gap:32px;height:'+(1123-130-58)+'px;overflow:hidden">'
       // 左欄
       + '<div>'
       + '<div style="margin-bottom:22px">'+blockTitle('基本資訊','Personal Info')
       + '<div style="font-size:13px;color:'+C_INK+';line-height:2.1;font-family:'+PAGE_SANS+'">'
       + '<div><span style="color:'+C_INK_LIGHT+';font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'+PAGE_DISPLAY+'">姓名 / Name</span><br><b style="font-size:14px;color:'+C_NAVY+';font-family:'+PAGE_SERIF+'">'+(esc(fd.name)||'—')+'</b></div>'
       + '<div style="margin-top:10px"><span style="color:'+C_INK_LIGHT+';font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'+PAGE_DISPLAY+'">學校 / School</span><br>'+(esc(fd.school)||'—')+'</div>'
       + '<div style="margin-top:10px"><span style="color:'+C_INK_LIGHT+';font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'+PAGE_DISPLAY+'">科別 / Department</span><br>'+(esc(fd.dept)||'—')+'</div>'
       + '</div></div>'
       + '<div style="margin-bottom:22px">'+blockTitle('幹部經歷','Leadership')+listItems(fd.d2roles)+'</div>'
       + '<div style="margin-bottom:22px">'+blockTitle('活動參與','Activities')+listItems(fd.d2activities)+'</div>'
       + '</div>'
       // 右欄
       + '<div>'
       + '<div style="margin-bottom:22px">'+blockTitle('競賽表現','Competitions')+listItems(fd.d2competitions)+'</div>'
       + '<div style="margin-bottom:22px">'+blockTitle('個人特質','Traits')
       + '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">'
       + (fd.d2traits.length ? fd.d2traits.map(function(t){
         return '<span style="background:'+C_CREAM+';color:'+C_NAVY+';border:1px solid '+C_BRASS+';padding:4px 11px;font-size:11px;font-weight:600;font-family:'+PAGE_SERIF+';letter-spacing:.3px">'+esc(t)+'</span>';
       }).join('') : '<div style="font-size:11.5px;color:'+C_INK_LIGHT+';font-style:italic;font-family:'+PAGE_DISPLAY+';letter-spacing:1px">— Not Specified —</div>')
       + '</div></div>'
       + '</div></div>'
       + pageFooter(2, 8)
       + '</div>';
}

// ─────────────────────────────────────────────────────────
//   pGrades — D2 學習成績反思頁
// ─────────────────────────────────────────────────────────
function pGrades(){
  function gb(n,t,idx){
    var html = renderLines(t,{fs:12.5, lh:1.85, hfs:13.5});
    return '<div style="margin-bottom:22px;padding-bottom:18px;border-bottom:1px dotted '+C_LINE_STRONG+'">'
         + '<div style="display:flex;align-items:baseline;gap:11px;margin-bottom:9px">'
         + '<div style="font-family:'+PAGE_DISPLAY+';font-style:italic;font-size:18px;color:'+C_BRASS_DEEP+';font-weight:600;letter-spacing:1px">№ '+idx+'</div>'
         + '<div style="flex:1;font-size:15px;font-weight:700;color:'+C_INK+';font-family:'+PAGE_SERIF+';letter-spacing:1.5px;border-bottom:1px solid '+C_BRASS+';padding-bottom:4px">'+(esc(n)||'科目名稱')+'</div>'
         + '</div>'
         + html + '</div>';
  }
  return '<div style="width:794px;height:1123px;background:'+C_PAPER+';position:relative;overflow:hidden;font-family:'+PAGE_SERIF+'">'
       + pageHeader('D2','學習歷程反思 — 成績','GRADES')
       + '<div style="padding:28px 48px 78px;overflow:hidden;height:'+(1123-130-58)+'px">'
       + gb(fd.d2g1n, fd.d2g1t, 'I')
       + gb(fd.d2g2n, fd.d2g2t, 'II')
       + gb(fd.d2g3n, fd.d2g3t, 'III')
       + '</div>'
       + pageFooter(5, 8)
       + '</div>';
}

// ─────────────────────────────────────────────────────────
//   pCourses — D2 課程學習成果頁
// ─────────────────────────────────────────────────────────
function pCourses(){
  function cb(n,t,idx){
    var html = renderLines(t,{fs:13, lh:1.95, hfs:14});
    return '<div style="margin-bottom:26px;padding-bottom:20px;border-bottom:1px dotted '+C_LINE_STRONG+'">'
         + '<div style="display:flex;align-items:baseline;gap:11px;margin-bottom:10px">'
         + '<div style="font-family:'+PAGE_DISPLAY+';font-style:italic;font-size:19px;color:'+C_BRASS_DEEP+';font-weight:600">№ '+idx+'</div>'
         + '<div style="flex:1;font-size:16px;font-weight:700;color:'+C_INK+';font-family:'+PAGE_SERIF+';letter-spacing:1.5px;border-bottom:1px solid '+C_BRASS+';padding-bottom:4px">'+(esc(n)||'課程名稱')+'</div>'
         + '</div>'
         + html + '</div>';
  }
  return '<div style="width:794px;height:1123px;background:'+C_PAPER+';position:relative;overflow:hidden;font-family:'+PAGE_SERIF+'">'
       + pageHeader('D2','課程學習成果','COURSES')
       + '<div style="padding:28px 48px 78px;overflow:hidden;height:'+(1123-130-58)+'px">'
       + cb(fd.d2c1n, fd.d2c1t, 'I')
       + cb(fd.d2c2n, fd.d2c2t, 'II')
       + '</div>'
       + pageFooter(6, 8)
       + '</div>';
}

/* ════════════════════════════════════════════════════════
   PAGE COLLECTIONS
══════════════════════════════════════════════════════════ */
function getD1Pages(){return[
  {l:'D1 封面', h:pCover('D1','多元表現總整心得')},
  {l:'C-2 + C-3', h:pDual('C-2','社團活動',fd.c2,fd.c2img,'C-3','幹部經驗',fd.c3,fd.c3img,2,4)},
  {l:'C-4 + C-8', h:pDual('C-4','服務學習',fd.c4,fd.c4img,'C-8','特殊優良表現',fd.c8,fd.c8img,3,4)},
  {l:'結論', h:pConc('D1','多元表現總整心得',fd.d1conc,4,4)}
];}

function getD2Pages(){return[
  {l:'D2 封面', h:pCover('D2','學習歷程自述')},
  {l:'個人簡歷', h:pBio()},
  {l:'自傳', h:pSec('D2','自傳',fd.d2bio,null,3,8)},
  {l:'就讀動機', h:pSec('D2','就讀動機',fd.d2motive,null,4,8)},
  {l:'學習成績', h:pGrades()},
  {l:'課程成果', h:pCourses()},
  {l:'未來計畫', h:pSec('D2','未來學習計畫',fd.d2plan,null,7,8)},
  {l:'學習反思', h:pConc('D2','學習歷程自述',fd.d2reflect,8,8)}
];}

function getD3Pages(){return[
  {l:'D3 封面', h:pCover('D3','其他有利審查資料')},
  {l:'語言+競賽', h:pDual('D3','語言檢定證書',fd.d3lang,fd.d3langimg,'D3','競賽獲獎紀錄',fd.d3awards,fd.d3awardsimg,2,3)},
  {l:'專題+其他', h:pDual('D3','專題成果',fd.d3projects,fd.d3projectsimg,'D3','其他有利資料',fd.d3other,fd.d3otherimg,3,3)}
];}

/* ════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
render();
</script>
